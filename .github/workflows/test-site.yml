name: Test Site

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  verify-project:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check required files
        run: |
          test -f index.html
          test -f style.css
          test -f script.js
          echo "All required files are present."

      - name: Validate JavaScript syntax
        run: node --check script.js

      - name: Check demo secret availability
        env:
          DEMO_MESSAGE: ${{ secrets.DEMO_MESSAGE }}
        run: |
          if [ -z "$DEMO_MESSAGE" ]; then
            echo "DEMO_MESSAGE is missing."
            exit 1
          fi
          echo "DEMO_MESSAGE is configured."
